<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0B0D1A">
  <title>Fusion 9 — build 030835</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; scrollbar-width: none; }
    *::-webkit-scrollbar { display: none; }
    html {
      height: 100%;
      overscroll-behavior: none;
    }
    body {
      margin: 0; padding: 0;
      background: #0B0D1A;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #F2EBE0;
      overscroll-behavior: none;
      /* -webkit-overflow-scrolling: touch KASITLI KALDIRILDI —
         overscroll-behavior:none ile çakışır, iOS Safari'de titreme yapar */
      touch-action: pan-y;  /* parmak kaydırmasına izin ver ama yatay engelle */
    }
    /* Form elemanları varsayılan tarayıcı renkleri yerine tema rengi kullanır */
    input, button, select, textarea { color: #F2EBE0; background: transparent; }
    button { cursor: pointer; border: none; }
    #f9-root { max-width: 480px; margin: 0 auto; padding: 6px; overflow-x: hidden; }
  
/* ── BASKI DALGASI ──────────────────────────────────── */
.f9-cell-wave-blocker {
  animation: wave-pulse 0.9s ease-in-out infinite !important;
  border-color: #E04B4B !important;
}
@keyframes wave-pulse {
  0%,100% { box-shadow: 0 0 4px #E04B4B88; }
  50%      { box-shadow: 0 0 12px #E04B4B, inset 0 0 6px #E04B4B44; }
}
/* GPU katmanı — animasyonlu hücreler için */
.f9-cell-wave-blocker { will-change: box-shadow; }

/* Katmanlı engel görsel sistemi */
.f9-cell-blocker-layer3 {
  border: 2px solid #E04B4B !important;
  box-shadow: inset 0 0 8px #E04B4B44, 0 0 4px #E04B4B66;
}
.f9-cell-blocker-layer2 {
  border: 2px solid #E08B2B !important;
  box-shadow: inset 0 0 6px #E08B2B33, 0 0 3px #E08B2B44;
}
/* Çatlak animasyonu — katman azalınca oynar */
@keyframes f9-blocker-crack {
  0%   { transform: scale(1)    rotate(0deg);   filter: brightness(1); }
  15%  { transform: scale(1.08) rotate(-3deg);  filter: brightness(1.6); }
  30%  { transform: scale(0.95) rotate(2deg);   filter: brightness(0.8); }
  50%  { transform: scale(1.04) rotate(-1deg);  filter: brightness(1.3); }
  70%  { transform: scale(0.98) rotate(1deg);   filter: brightness(1); }
  100% { transform: scale(1)    rotate(0deg);   filter: brightness(1); }
}
.f9-blocker-crack {
  animation: f9-blocker-crack 0.45s cubic-bezier(.36,.07,.19,.97) forwards;
  will-change: transform, filter;
}
/* Katmanlı engel görsel */
.f9-cell-blocker-layer3 { border-color:#E04B4B!important;box-shadow:inset 0 0 0 2px #E04B4B44; }
.f9-cell-blocker-layer2 { border-color:#E08B2B!important;box-shadow:inset 0 0 0 2px #E08B2B44; }
.f9-cell-blocker-spreading { animation:f9-blocker-spread 0.6s cubic-bezier(.34,1.56,.64,1); }
@keyframes f9-blocker-spread { 0%{transform:scale(0);opacity:0} 60%{transform:scale(1.2);opacity:1} 100%{transform:scale(1);opacity:1} }
.f9-cell-blocker-hit1,.f9-cell-blocker-hit2 { animation:f9-blocker-crack 0.4s ease-out; }
@keyframes f9-blocker-crack { 0%{transform:scale(1)} 30%{transform:scale(1.15) rotate(3deg);filter:brightness(2.5)} 60%{transform:scale(.95) rotate(-2deg)} 100%{transform:scale(1)} }
/* Katman renkleri */
/* Katman 3 (en sağlam — çelik) */
.f9-cell-blocker-layer3 {
  border-color: #E04B4B !important;
  box-shadow: inset 0 0 0 2px #E04B4B44, 0 0 8px #E04B4B44;
  background: linear-gradient(135deg,#2A0A0A,#1A0505) !important;
}
/* Katman 2 (orta — bakır) */
.f9-cell-blocker-layer2 {
  border-color: #E08B2B !important;
  box-shadow: inset 0 0 0 2px #E08B2B44, 0 0 6px #E08B2B33;
  background: linear-gradient(135deg,#2A1A05,#1A1005) !important;
}
/* Çatlak overlay — vuruş anında */
.f9-cell-blocker::after {
  content:"";
  position:absolute;inset:0;
  background: repeating-linear-gradient(
    45deg, transparent, transparent 4px,
    rgba(255,255,255,0.04) 4px, rgba(255,255,255,0.04) 5px
  );
  border-radius:inherit;
  pointer-events:none;
  opacity:0;
  transition: opacity 0.3s;
}
.f9-cell-blocker-layer2::after { opacity:0.4; }
.f9-cell-blocker-layer3::after { opacity:0.7; }
/* Vuruş parıltısı */
@keyframes f9-blocker-hit-flash {
  0%   { filter:brightness(1); }
  20%  { filter:brightness(2.5) saturate(2); }
  50%  { filter:brightness(1.3) saturate(1.5); }
  100% { filter:brightness(1); }
}
.f9-cell-blocker-hit { animation: f9-blocker-hit-flash 0.4s ease-out; }

/* ── PATLAMA & YENİ SAYI ANİMASYONLARI ─────────────── */
@keyframes f9-blast-out {
  0%   { transform:scale(1);   opacity:1; filter:brightness(1); }
  30%  { transform:scale(1.4); opacity:1; filter:brightness(3) saturate(0); }
  60%  { transform:scale(1.6); opacity:0.6; }
  100% { transform:scale(0.2); opacity:0; }
}
@keyframes f9-fall-in {
  0%   { transform:translateY(-140%) scale(0.6); opacity:0; }
  55%  { transform:translateY(10%) scale(1.08); opacity:1; }
  75%  { transform:translateY(-4%) scale(0.97); }
  100% { transform:translateY(0)   scale(1);    opacity:1; }
}
@keyframes f9-spawn-gift {
  0%   { transform:scale(0) rotate(-30deg); opacity:0; filter:brightness(3); }
  50%  { transform:scale(1.3) rotate(8deg);  opacity:1; filter:brightness(1.8); }
  70%  { transform:scale(0.9) rotate(-3deg); }
  100% { transform:scale(1)   rotate(0deg);  opacity:1; filter:brightness(1); }
}
@keyframes f9-blast-ring {
  0%   { transform:scale(0.3); opacity:0.9; }
  60%  { transform:scale(2.2); opacity:0.4; }
  100% { transform:scale(3.5); opacity:0; }
}
@keyframes f9-shockwave {
  0%   { transform:scale(1);   opacity:0.8; border-width:4px; }
  100% { transform:scale(3.2); opacity:0;   border-width:1px; }
}
.f9-blast-out  {
  animation: f9-blast-out  var(--f9-blast-dur,0.38s) cubic-bezier(.4,0,.6,1) forwards;
  will-change: transform, opacity, filter;
}
.f9-fall-in    {
  animation: f9-fall-in    var(--f9-fall-dur,0.42s) cubic-bezier(.22,.68,0,1.2) forwards;
  will-change: transform, opacity;
}
.f9-spawn-gift {
  animation: f9-spawn-gift var(--f9-spawn-dur,0.5s) cubic-bezier(.34,1.56,.64,1) forwards;
  will-change: transform, opacity, filter;
}
</style>
</head>
<body>
<div id="f9-root"></div>
<script>/*__FUSION9_SCRIPT__*/</script>

</body>
</html>
